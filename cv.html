    <script>
      window.__loaderStart = performance.now();

    <style id="app-loader-critical">
      html.is-loading body {
        overflow: hidden;
      }

      html.is-loading #site-header,
      html.is-loading .site-shell {
        visibility: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        color: #e6edf3;
      }

      [data-theme="light"] #app-loader {
        background: #ffffff;
        color: #1f2328;
      }

      #app-loader .app-loader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #30363d;
        border-top-color: #4493f8;
        border-radius: 50%;
        animation: app-loader-spin 0.75s linear infinite;
      }

      [data-theme="light"] #app-loader .app-loader-spinner {
        border-color: #d0d7de;
        border-top-color: #0969da;
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      #app-loader.is-leaving {
        opacity: 0;
        transition: opacity 0.28s ease;
        pointer-events: none;
      }

      html:not(.is-loading) #app-loader {
        display: none;
      }

      .readme-link-x {
        font-size: 0;
        line-height: 0;
      }

      .readme-link-x .x-handle,
      .readme-link-x > span:not(.social-icon-link) {
        display: none !important;
      }
    </style>
