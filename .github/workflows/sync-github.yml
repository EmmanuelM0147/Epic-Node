name: Sync GitHub Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "data/github-profile.json"
      - "data/github-repos.json"
      - "data/github-contributions.json"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync GitHub profile and repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER_TOKEN: ${{ secrets.GITHUB_USER_TOKEN }}
          GITHUB_USERNAME: EmmanuelM0147
        run: node scripts/sync-github.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-profile.json data/github-repos.json data/github-contributions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync GitHub profile and repository data"
            git push
          fi
