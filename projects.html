<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Projects by Emmanuel Okeowo" />
    <meta property="og:title" content="Projects - Emmanuel Okeowo" />
    <meta property="og:description" content="Projects by Emmanuel Okeowo - production APIs, fintech backends, and open-source work." />
    <meta property="og:image" content="https://epicnode.hostless.site/assets/og-image.png" />
    <meta property="og:image:alt" content="Emmanuel Okeowo - Senior Backend & AI Engineer" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://epicnode.hostless.site/assets/og-image.png" />
    <title>Projects - Emmanuel Okeowo</title>
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/github-theme.css?v=20260710" />
    <script>
      window.__loaderStart = performance.now();
      document.documentElement.classList.add("is-loading");
    </script>
    <style id="app-loader-critical">
      html.is-loading body {
        overflow: hidden;
      }

      html.is-loading #site-header,
      html.is-loading .site-shell {
        visibility: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        color: #e6edf3;
      }

      [data-theme="light"] #app-loader {
        background: #ffffff;
        color: #1f2328;
      }

      #app-loader .app-loader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #30363d;
        border-top-color: #4493f8;
        border-radius: 50%;
        animation: app-loader-spin 0.75s linear infinite;
      }

      [data-theme="light"] #app-loader .app-loader-spinner {
        border-color: #d0d7de;
        border-top-color: #0969da;
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      #app-loader.is-leaving {
        opacity: 0;
        transition: opacity 0.28s ease;
        pointer-events: none;
      }

      html:not(.is-loading) #app-loader {
        display: none;
      }
    </style>
  </head>
  <body
    data-page-title="Projects - Emmanuel Okeowo"
    data-page-description="Projects by Emmanuel Okeowo - production APIs, fintech backends, and open-source work."
  >
    <div id="app-loader" class="app-loader" role="status" aria-live="polite" aria-busy="true" aria-label="Loading portfolio">
      <div class="app-loader-panel">
        <div class="app-loader-spinner" aria-hidden="true"></div>
        <p class="app-loader-brand">epicnode.dev</p>
      </div>
    </div>
    <header id="site-header" class="site-header"></header>
    <div class="site-shell">
      <aside id="sidebar" class="sidebar" aria-label="Profile sidebar"></aside>
      <main class="main-content">
        <div id="tabs"></div>
        <div class="page-content">
          <header class="section-header">
            <h2>Projects</h2>
          </header>
          <div class="filters-bar">
            <div class="filter-group">
              <label for="filter-type">Type</label>
              <select id="filter-type">
                <option value="all">All</option>
                <option value="public">Public</option>
                <option value="private">Client / Private</option>
                <option value="fork">Fork</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-language">Language</label>
              <select id="filter-language">
                <option value="all">All</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-sort">Sort</label>
              <select id="filter-sort">
                <option value="updated">Last updated</option>
                <option value="name">Name</option>
                <option value="stars">Stars</option>
              </select>
            </div>
            <button id="refresh-repos" class="btn-secondary" type="button">Refresh from GitHub</button>
          </div>

          <p id="projects-status" class="status-line" aria-live="polite"></p>
          <p id="projects-count" class="count-line"></p>
          <div id="projects-list" class="projects-list"></div>

          <p class="section-footer">
            <a id="projects-github-link" href="#" target="_blank" rel="noopener noreferrer">
              See all my projects on GitHub →
            </a>
          </p>
        </div>
      </main>
    </div>
    <script src="assets/js/shared.js?v=20260710"></script>
    <script src="assets/js/github-api.js?v=20260710"></script>
    <script src="assets/js/projects.js?v=20260710"></script>
  </body>
</html>
